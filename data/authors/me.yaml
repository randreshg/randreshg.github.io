bio: |
  I design execution-contract systems that make State, Dependency, and Effect
  compiler-visible across compilers, runtime systems, and agentic AI workflows.
  My work spans LLVM and MLIR pipelines, OpenMP and event-driven runtimes, and
  typed orchestration systems for heterogeneous and distributed execution.

