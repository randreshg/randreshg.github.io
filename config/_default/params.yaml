hugoblox:
  schema: "2.0"

  identity:
    name: "Rafael Herrera Guaitero"
    organization: ""
    type: person
    tagline: "Ph.D. candidate building execution-contract systems for compilers, runtimes, and agentic AI."
    description: "Research portfolio of Rafael Herrera Guaitero, focused on compilers, runtime systems, heterogeneous computing, and agentic AI."
    social:
      twitter: "randres_hg"

  theme:
    mode: system
    pack: "default"
    colors:
      primary: ""
      secondary: ""
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    font: "sans"
    size: "sm"

  layout:
    radius: "md"
    spacing: "compact"
    avatar_shape: circle

  header:
    enable: true
    style: navbar-simple
    sticky: true
    align: left
    search: false
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: "Research portfolio and selected systems projects."

  copyright:
    notice: "© {year} {name}. This work is licensed under {license}"
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: ""
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: "Guidance for AI crawlers - customize to match your public content."
      contact: "mailto:rafaelhg@udel.edu"

  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  search:
    enable: false
    suggestions: []
    quick_actions: []

  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  repository:
    enable: true
    url: "https://github.com/randreshg/randreshg.github.io"
    branch: main
    content_dir: content

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""
